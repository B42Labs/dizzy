name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # cosign keyless signing

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o bin/dizzy-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/dizzy/
      - name: Import Apple signing certificate
        if: matrix.goos == 'darwin' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
      - name: Sign macOS binary
        if: matrix.goos == 'darwin'
        env:
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
        run: |
          IDENTITY="${APPLE_IDENTITY:--}"
          codesign --force --options runtime -s "$IDENTITY" \
            bin/dizzy-${{ matrix.goos }}-${{ matrix.goarch }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dizzy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/dizzy-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1

  sign-and-release:
    name: Sign, SBOM & Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/

      - name: Collect binaries
        run: |
          mkdir -p dist
          for dir in artifacts/dizzy-*; do
            cp "$dir"/dizzy-* dist/
          done
          ls -lh dist/

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate checksums
        working-directory: dist
        run: sha256sum dizzy-* > checksums.txt

      - name: Sign binaries and checksums with cosign
        working-directory: dist
        run: |
          for file in dizzy-* checksums.txt; do
            cosign sign-blob --yes \
              --new-bundle-format \
              --bundle "${file}.bundle" \
              "$file"
          done

      - name: Generate SBOMs
        run: |
          for bin in dist/dizzy-*; do
            # skip cosign signature bundles
            case "$bin" in *.bundle) continue ;; esac
            name=$(basename "$bin")
            syft "$bin" --output spdx-json="dist/${name}.spdx.json"
            syft "$bin" --output cyclonedx-json="dist/${name}.cdx.json"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
