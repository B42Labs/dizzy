name: small
seed: 42                       # deterministic; same seed => same plan

resources:
  subnet_pools:    1
  address_scopes:  1
  networks:        3
  routers:         2
  security_groups: 2
  router_links:    1             # wire the two routers together over a transit subnet
  floating_ips:    2             # allocated from the external network, if one exists

distribution:
  subnets_per_network:      { min: 1, max: 3 }
  ports_per_network:        { min: 1, max: 2 }
  rules_per_security_group: { min: 1, max: 3 }
  subnet_from_pool_ratio:   0.5
  ipv6_ratio:               0.3
  subnets_attached_to_router_ratio: 0.7
  routers_with_external_gateway_ratio: 0.5   # half the routers want an external gateway
  floating_ip_associated_ratio:        0.5   # half the floating IPs target a port

topology:
  router_attach_strategy:    random
  port_security_group_count: { min: 1, max: 2 }
