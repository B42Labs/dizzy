name: medium
seed: 42

resources:
  domains:  2                  # admin-only (> 1 domain): domain-manager mode rejects this profile
  roles:    3                  # admin-only; ignored in domain-manager mode
  projects: 20
  users:    50

distribution:
  projects_per_domain:            { min: 1, max: 5 }
  assignments_per_user:           { min: 1, max: 3 }
  domain_scoped_assignment_ratio: 0.1
  users_issuing_tokens_ratio:     0.5

chaos:
  duration: 30m
  interval: { min: 200ms, max: 3s }
  parallel: { max: 4 }
  churn_ratio: 0.5
  target_fill: 0.8
  token_ratio: 0.3
