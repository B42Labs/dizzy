name: small
seed: 42                       # deterministic; same seed => same plan

resources:
  domains:  1                  # admin-only; forced to the single in-scope domain in domain-manager mode
  roles:    2                  # admin-only; ignored (existing roles reused) in domain-manager mode
  projects: 5
  users:    10

distribution:
  projects_per_domain:            { min: 1, max: 3 }   # round-robin deal granularity, not a hard cap
  assignments_per_user:           { min: 1, max: 3 }   # (user, target, role) grants drawn per user
  domain_scoped_assignment_ratio: 0.1                  # fraction of grants targeting the domain, not a project
  users_issuing_tokens_ratio:     0.5                  # fraction of users that authenticate for a scoped token

chaos:                                 # `keystone chaos --scenario scenarios/keystone/small.yaml` runs as-is
  duration: 5m                         # total runtime; the only hard stop besides Ctrl-C
  interval: { min: 200ms, max: 3s }    # random delay drawn per churn tick
  parallel: { max: 4 }                 # per-tick fan-out, drawn in [1, max]; capped by --concurrency
  churn_ratio: 0.5                     # create bias at steady state (0..1)
  target_fill: 0.8                     # fraction of the envelope kept populated (0..1)
  token_ratio: 0.3                     # probability per tick of issuing a token as a live, assigned user

# A single domain keeps this profile runnable in domain-manager mode (which
# requires domains <= 1). It stays deliberately tiny so it runs against any
# domain that has a manager.
