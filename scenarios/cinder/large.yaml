name: large
seed: 7654321                  # deterministic; same seed => same plan

resources:
  volumes: 50

distribution:
  volume_size_gib:      { min: 1, max: 10 }  # initial size drawn per volume
  volume_resized_ratio: 0.6                  # fraction of volumes extended after creation
  resize_growth_gib:    { min: 1, max: 8 }   # extend delta drawn per resized volume
  snapshots_per_volume: { min: 1, max: 4 }   # drawn per volume

# Needs raised quotas; guarded by the apply quota pre-check.
